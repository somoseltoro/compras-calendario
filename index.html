<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendario de Citas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =======================
BASE
======================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#030712;
color:white;
overflow-x:hidden;
}

/* =======================
FONDO
======================= */

.bg{
position:fixed;
inset:0;
z-index:-4;
background:
radial-gradient(circle at 20% 20%, rgba(37,99,235,.35), transparent 35%),
radial-gradient(circle at 80% 30%, rgba(6,182,212,.25), transparent 35%),
radial-gradient(circle at 50% 80%, rgba(139,92,246,.25), transparent 40%),
#030712;
}

.blur1,.blur2{
position:fixed;
width:500px;
height:500px;
filter:blur(180px);
opacity:.15;
z-index:-3;
}

.blur1{background:#2563eb;top:-150px;left:-150px;}
.blur2{background:#8b5cf6;bottom:-150px;right:-150px;}

#particles{
position:fixed;
inset:0;
z-index:-2;
pointer-events:none;
}

/* =======================
HEADER
======================= */

.header{
width:95%;
max-width:1500px;
margin:25px auto;
padding:18px 25px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(255,255,255,.05);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
}

.title h1{
font-size:32px;
font-weight:700;
}

.title p{
color:#94a3b8;
margin-top:5px;
}

/* =======================
LOGOS
======================= */

.logo-container{
width:55%;
overflow:hidden;
}

.track{
display:flex;
gap:55px;
animation:scroll 22s linear infinite;
align-items:center;
}

.track img{
height:32px;
filter:none;
transition:.25s;
}

.track img:hover{
transform:scale(1.08);
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* =======================
RELOJ (MEJORADO)
======================= */

#clock{
display:flex;
align-items:center;
gap:8px;

padding:6px 12px;

border-radius:999px;

background:rgba(34,197,94,.12);
border:1px solid rgba(34,197,94,.25);

font-size:11px; /* 👈 MÁS CHICO */
color:#dcfce7;
white-space:nowrap;
}

/* punto verde */
#clock::before{
content:"";
width:8px;
height:8px;
border-radius:50%;
background:#22c55e;
display:inline-block;
animation:pulse 1.8s infinite;
}

@keyframes pulse{
0%{transform:scale(1); opacity:1;}
50%{transform:scale(1.4); opacity:.6;}
100%{transform:scale(1); opacity:1;}
}

/* =======================
POWER BI
======================= */

.card{
width:95%;
max-width:1500px;
height:80vh;
margin:auto;

background:rgba(255,255,255,.04);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,.08);
border-radius:32px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* BOTÓN */
.bottom-bar{
width:95%;
max-width:1500px;
margin:15px auto;
display:flex;
justify-content:flex-end;
}

button{
padding:8px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
color:white;
cursor:pointer;
font-size:12px;
}

button:hover{
background:rgba(255,255,255,.1);
}

/* FOOTER */
.footer{
width:95%;
max-width:1500px;
margin:20px auto;
text-align:center;
font-size:12px;
color:#94a3b8;
}

.footer a{color:#60a5fa;}

</style>

</head>

<body>

<div class="bg"></div>
<div class="blur1"></div>
<div class="blur2"></div>

<!-- HEADER -->
<header class="header">

<div class="title">

<div class="logo-container">
