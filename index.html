<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendario de Citas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#030712;
color:white;
overflow-x:hidden;
}

/* ===== FONDO ===== */

.bg{
position:fixed;
inset:0;
z-index:-4;
background:
radial-gradient(circle at 20% 20%, rgba(37,99,235,.35), transparent 35%),
radial-gradient(circle at 80% 30%, rgba(6,182,212,.25), transparent 35%),
radial-gradient(circle at 50% 80%, rgba(139,92,246,.25), transparent 40%),
#030712;
}

.blur1,.blur2{
position:fixed;
width:500px;
height:500px;
filter:blur(180px);
opacity:.15;
z-index:-3;
}

.blur1{background:#2563eb;top:-150px;left:-150px;}
.blur2{background:#8b5cf6;bottom:-150px;right:-150px;}

/* ===== PARTÍCULAS (🔥 RESTAURADO) ===== */

#particles{
position:fixed;
inset:0;
z-index:-2;
pointer-events:none;
}

/* ===== HEADER ===== */

.header{
width:95%;
max-width:1500px;
margin:25px auto;
padding:18px 25px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(255,255,255,.05);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
}

.title h1{font-size:32px;font-weight:700;}
.title p{color:#94a3b8;margin-top:5px;}

/* ===== LOGOS ===== */

.logo-container{width:55%;overflow:hidden;}
.track{
display:flex;
gap:55px;
animation:scroll 22s linear infinite;
align-items:center;
}

.track img{height:32px;}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* ===== RELOJ ===== */

#clock{
display:flex;
align-items:center;
gap:8px;
padding:6px 12px;
border-radius:999px;

background:rgba(34,197,94,.12);
border:1px solid rgba(34,197,94,.25);

font-size:11px;
color:#dcfce7;
white-space:nowrap;
}

#clock::before{
content:"";
width:8px;
height:8px;
border-radius:50%;
background:#22c55e;
display:inline-block;
animation:pulse 1.8s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1;}
50%{transform:scale(1.4);opacity:.6;}
100%{transform:scale(1);opacity:1;}
}

/* ===== POWER BI ===== */

.card{
width:95%;
max-width:1500px;
height:80vh;
margin:auto;

background:rgba(255,255,255,.04);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,.08);
border-radius:32px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* ===== FOOTER ===== */

.footer{
width:95%;
max-width:1500px;
margin:20px auto;
text-align:center;
font-size:12px;
color:#ffffff;
}

.footer a{
color:#ffffff;
text-decoration:none;
font-weight:600;
}

/* ===== BOTÓN ===== */

.bottom-bar{
width:95%;
max-width:1500px;
margin:15px auto;
display:flex;
justify-content:flex-end;
}

button{
padding:8px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
color:white;
cursor:pointer;
font-size:12px;
}

button:hover{background:rgba(255,255,255,.1);}

</style>

</head>

<body>

<div class="bg"></div>
<div class="blur1"></div>
<div class="blur2"></div>

<canvas id="particles"></canvas>

<!-- HEADER -->
<header class="header">

<div class="title">
<h1>Calendario de Citas</h1>
<p>Monitoreo y gestión en tiempo real</p>
</div>

<div class="logo-container">
<div class="track">

<img src="alen.png"><img src="aramluz.png"><img src="arcor.png">
<img src="bic.png"><img src="canels.png"><img src="clorox.png">
<img src="colgate.png"><img src="conagra.png"><img src="electrolit.png">
<img src="energizer.png"><img src="heinz.png"><img src="kellogss.png">
<img src="lamorena.png"><img src="mondelez.jpg"><img src="unilever.png">

<img src="alen.png"><img src="aramluz.png"><img src="arcor.png">
<img src="bic.png"><img src="canels.png"><img src="clorox.png">
<img src="colgate.png"><img src="conagra.png"><img src="electrolit.png">
<img src="energizer.png"><img src="heinz.png"><img src="kellogss.png">
<img src="lamorena.png"><img src="mondelez.jpg"><img src="unilever.png">

</div>
</div>

<div id="clock"></div>

</header>

<!-- POWER BI -->
<section class="card">

<iframe
src="https://app.powerbi.com/view?r=eyJrIjoiMDA4OTFhNDQtZTljZS00YzUxLTkyZjEtMTE0MjA0ZjAyMWMwIiwidCI6ImFhODFiNGU2LTllMTMtNDUxNC1iNzkwLTY1YWUyNDZlZjExZiIsImMiOjR9">
</iframe>

</section>

<!-- BOTÓN -->
<div class="bottom-bar">
<button onclick="openFull()">🔍 Abrir en ventana nueva</button>
</div>

<!-- FOOTER -->
<footer class="footer">
<p>
Desarrollado por
<a href="https://www.somoseltoro.com" target="_blank">
Distribuidora El Toro
</a>
</p>

<p>© 2008 - 2028 Todos los derechos reservados</p>
</footer>

<script>

/* reloj */
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleString("es-MX");
},1000);

/* abrir */
function openFull(){
window.open(
"https://app.powerbi.com/view?r=eyJrIjoiMDA4OTFhNDQtZTljZS00YzUxLTkyZjEtMTE0MjA0ZjAyMWMwIiwidCI6ImFhODFiNGU2LTllMTMtNDUxNC1iNzkwLTY1YWUyNDZlZjExZiIsImMiOjR9",
"_blank"
);
}

/* ===== PARTÍCULAS RESTAURADAS ===== */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const particles = [];
const COUNT = 140;
const MAX_DIST = 160;

for(let i=0;i<COUNT;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.7)*1.5,
vy:(Math.random()-0.7)*1.5,
r:Math.random()*2+0.6
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<particles.length;i++){

let p = particles[i];

p.x += p.vx;
p.y += p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

/* puntos */
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(220,230,255,0.45)";
ctx.fill();

/* líneas */
for(let j=i+1;j<particles.length;j++){
let p2 = particles[j];

let dx = p.x-p2.x;
let dy = p.y-p2.y;
let dist = Math.sqrt(dx*dx+dy*dy);

if(dist<MAX_DIST){
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(p2.x,p2.y);

ctx.strokeStyle =
`rgba(200,210,255,${0.15 - dist/MAX_DIST * 0.15})`;

ctx.lineWidth = 0.7;
ctx.stroke();
}
}
}

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
